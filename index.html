<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salon Vocal</title>
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        
        .accueil { 
            display: flex; align-items: center; justify-content: center; height: 100%; 
            background: #111; color: #fff; flex-direction: column; 
        }
        input { 
            padding: 15px; width: 250px; border-radius: 10px; border: none; margin-bottom: 20px; 
            text-align: center; font-size: 16px; background: #222; color: #fff;
        }
        button { 
            padding: 15px 40px; border-radius: 10px; border: none; background: #fff; 
            font-weight: bold; cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        
        #appel { display: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="accueil" id="accueil">
        <h2 style="margin-bottom:30px;">Connexion au salon</h2>
        <input type="text" id="pseudo" placeholder="Votre pseudo..." maxlength="12">
        <button onclick="lancer()">Rejoindre</button>
    </div>

    <div id="appel"></div>

    <script>
        function lancer() {
            const p = document.getElementById('pseudo').value;
            if(!p) return alert("Pseudo obligatoire");
            
            document.getElementById('accueil').style.display = 'none';
            document.getElementById('appel').style.display = 'block';

            const options = {
                roomName: "SalonPriveUnique123456789",
                parentNode: document.getElementById('appel'),
                userInfo: { displayName: p },
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: true,
                    disableDeepLinking: true,
                    hideConferenceSubject: true,
                    hideConferenceTimer: true,
                    disableProfile: true, // Désactive le profil utilisateur
                    disableInviteRevocation: true,
                    // Tentative d'écrasement du logo via paramètres avancés
                    watermark: false
                },
                interfaceConfigOverwrite: {
                    // Masquage agressif des logos
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                    SHOW_BRAND_WATERMARK: false,
                    SHOW_POWERED_BY: false,
                    HIDE_INVITE_MORE_HEADER: true,
                    // Toolbar limitée au strict nécessaire
                    TOOLBAR_BUTTONS: ['microphone', 'chat', 'hangup', 'tileview', 'settings']
                }
            };
            
            const api = new JitsiMeetExternalAPI("meet.jit.si", options);
            
            api.addEventListener('videoConferenceLeft', () => { location.reload(); });
        }
    </script>
</body>
</html>
