<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espace Vocal</title>
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #11141a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* Écran de connexion minimaliste */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
        }

        .login-box {
            background-color: #1c1f26;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 0 0 20px 0;
            color: #ffffff;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: #252932;
            border: 1px solid #383e4c;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: #52668d;
        }

        button {
            width: 100%;
            background-color: #ffffff;
            color: #11141a;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Écran d'appel */
        .vocal-screen {
            display: none;
            width: 100%;
            height: 100%;
            background-color: #000000;
        }

        #jitsi-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="login-screen" id="setup-screen">
        <div class="login-box">
            <h1>Salon Vocal & Chat</h1>
            <input type="text" id="username" placeholder="Votre pseudo..." maxlength="15" autocomplete="off">
            <button id="join-btn">Rejoindre l'appel</button>
        </div>
    </div>

    <div class="vocal-screen" id="vocal-screen">
        <div id="jitsi-container"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("join-btn").addEventListener("click", rejoindreSalon);
        });

        function rejoindreSalon() {
            const pseudo = document.getElementById('username').value.trim();
            if (pseudo === "") {
                alert("Veuillez entrer un pseudo.");
                return;
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('vocal-screen').style.display = 'block';

            if (typeof JitsiMeetExternalAPI === 'undefined') {
                alert("Erreur réseau. Veuillez actualiser la page.");
                return;
            }

            const domain = "meet.jit.si";
            const options = {
                roomName: "SalonVocalStandardPrive998877", 
                width: "100%",
                height: "100%",
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: pseudo },
                configOverwrite: {
                    startWithVideoMuted: true, // Désactive la caméra
                    startWithAudioMuted: false, // Active le micro
                    prejoinPageEnabled: false, // Pas d'écran d'attente
                    disableDeepLinking: true, // Bloque la pub de l'app mobile
                    hideConferenceSubject: true, // Masque le nom de la conférence en haut
                    hideConferenceTimer: true, // Masque le chronomètre
                    
                    // Désactive les filigranes et logos Jitsi intégrés
                    doNotFlipLocalVideo: true,
                    analytics: { disabled: true }
                },
                interfaceConfigOverwrite: {
                    // Masque tous les logos et liens Jitsi de l'interface
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                    SHOW_BRAND_WATERMARK: false,
                    SHOW_POWERED_BY: false,
                    
                    // Garde uniquement les boutons utiles (Micro, Chat, Raccrocher, Options/Volume)
                    TOOLBAR_BUTTONS: ['microphone', 'chat', 'hangup', 'settings']
                }
            };

            const api = new JitsiMeetExternalAPI(domain, options);

            // Retour à l'accueil si on quitte
            api.addEventListener('videoConferenceLeft', () => {
                api.dispose();
                location.reload();
            });
        }
    </script>
</body>
</html>
