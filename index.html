<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CyberVocal ⚡</title>
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #151a24;
            --accent-color: #00ffaa;
            --accent-hover: #00cc88;
            --text-color: #e2e8f0;
            --muted-text: #64748b;
            --danger: #ff4a4a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 255, 170, 0.05), transparent);
        }

        .app-card {
            background-color: var(--panel-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 2px rgba(0, 255, 170, 0.2);
            text-align: center;
            max-width: 420px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s ease;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted-text);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            background-color: #1c2330;
            border: 2px solid transparent;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.15);
        }
