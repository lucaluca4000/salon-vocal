<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ CyberVocal & Chat ⚡</title>
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #151a24;
            --accent-color: #00ffaa;
            --accent-hover: #00cc88;
            --text-color: #e2e8f0;
            --muted-text: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* Écran d'accueil */
        .setup-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            background-image: radial-gradient(circle at top right, rgba(0, 255, 170, 0.05), transparent);
        }

        .app-card {
            background-color: var(--panel-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted-text);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            background-color: #1c2330;
            border: 2px solid transparent;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #05070a;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* Zone de l'appel et du Chat (Plein écran sur Mobile) */
        .vocal-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #000;
        }

        #jitsi-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="setup-screen" id="setup-screen">
        <div class="app-card">
            <h1>⚡ CyberVocal</h1>
            <p class="subtitle">Vocal & Chat écrit en direct.</p>
            
            <input type="text" id="username" placeholder="Entre ton pseudo..." maxlength="15" autocomplete="off">
            <button onclick="rejoindreSalon()">Rejoindre l'appel</button>
        </div>
    </div>

    <div class="vocal-screen" id="vocal-screen">
        <div id="jitsi-container"></div>
    </div>
