<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espace Vocal et Chat</title>
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #11141a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* Écran de connexion épuré */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
        }

        .login-box {
            background-color: #1c1f26;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 0 0 20px 0;
            color: #ffffff;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: #252932;
            border: 1px solid #383e4c;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: #52668d;
        }

        button {
            width: 100%;
            background-color: #ffffff;
            color: #11141a;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #e5e5e5;
        }

        /* Écran d'appel */
        .vocal-screen {
            display: none;
            width: 100%;
            height: 100%;
            background-color: #000000;
        }

        #jitsi-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="login-screen" id="setup-screen">
        <div class="login-box">
            <h1>Salon Vocal & Chat</h1>
            <input type="text" id="username" placeholder="Entrez votre pseudo..." maxlength="15" autocomplete="off">
            <button id="join-btn">Rejoindre l'appel</button>
        </div>
    </div>

    <div class="vocal-screen" id="vocal-screen">
        <div id="jitsi-container"></div>
    </div>

    <script>
        // On attend que la page soit complètement chargée pour activer le bouton
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("join-btn").addEventListener("click", rejoindreSalon);
        });

        function rejoindreSalon() {
            const pseudo = document.getElementById('username').value.trim();
            if (pseudo === "") {
                alert("Veuillez entrer un pseudo.");
                return;
            }

            // Changement d'écran
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('vocal-screen').style.display = 'block';

            // Vérification que la bibliothèque Jitsi est bien chargée
            if (typeof JitsiMeetExternalAPI === 'undefined') {
                alert("Erreur : Impossible de se connecter aux serveurs audio. Veuillez actualiser la page.");
                return;
            }

            const domain = "meet.jit.si";
            const options = {
                roomName: "SalonVocalStandardPrive998877", // Nom du salon unique en arrière-plan
                width: "100%",
                height: "100%",
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: pseudo },
                configOverwrite: {
                    startWithVideoMuted: true, // Caméra désactivée
                    startWithAudioMuted: false, // Micro activé directement
                    prejoinPageEnabled: false, // Pas d'écran de chargement Jitsi intermédiaire
                    disableDeepLinking: true // Empêche Jitsi de forcer l'ouverture de son application mobile
                },
                interfaceConfigOverwrite: {
                    // Uniquement les boutons nécessaires : Micro, Chat, Raccrocher
                    TOOLBAR_BUTTONS: ['microphone', 'chat', 'hangup', 'tileview'],
                    MOBILE_APP_PROMO: false // Supprime les publicités pour l'application mobile
                }
            };

            // Initialisation de l'appel
            const api = new JitsiMeetExternalAPI(domain, options);

            // Retour à l'accueil si l'utilisateur raccroche
            api.addEventListener('videoConferenceLeft', () => {
                api.dispose();
                location.reload();
            });
        }
    </script>
</body>
</html>
